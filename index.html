<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Weather Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" >
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="dashboard">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">🌤wheatherForcast</div>

      <form id="weather-form" class="search-box">
        <input type="text" id="city" placeholder="Search city..." required />
        <button type="submit">🔍</button>
      </form>

      <div class="profile">👤</div>
    </header>

    <!-- TOP GRID -->
    <section class="top-grid">

      <div class="card big-card">
        <h3>Current Weather</h3>
        <div class="weather-main">
          <div class="temp">--°C</div>
          <div class="details">
            <p class="location">--</p>
            <p class="condition">--</p>
          </div>
        </div>
      </div>

      <div class="card small-card">
        <h4>Wind</h4>
        <p id="wind">--</p>
      </div>

      <div class="card small-card">
        <h4>Humidity</h4>
        <p id="humidity">--</p>
      </div>

      <div class="card small-card">
        <h4>Pressure</h4>
        <p id="pressure">--</p>
      </div>
    </section>

    <!-- HOURLY FORECAST -->
    <section class="forecast-card card">
      <h3>Hour-by-Hour Forecast</h3>
      <canvas id="hourlyChart"></canvas>
    </section>

    <!-- WEEKLY SUMMARY -->
    <section class="weekly card">
      <h3>7 Day Summary</h3>
      <div id="weekly-list" class="weekly-list"></div>
    </section>

  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Your JS file -->
 

<script src="script.js"></script>
</body>
</html>
